apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-sata-ssd
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
    # Server-side apply keeps ArgoCD from fighting the LSO operator
    # over fields it doesn't manage (provisioner, reclaimPolicy, etc.)
    argocd.argoproj.io/sync-options: ServerSideApply=true
provisioner: kubernetes.io/no-provisioner