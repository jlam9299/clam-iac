apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

generatorOptions:
  disableNameSuffixHash: true
  
secretGenerator:
  - name: ldap-bind-password
    namespace: openshift-config
    type: Opaque
    envs:
      - ldap-bind-password.txt

patches:
  - target:
      group: config.openshift.io
      version: v1
      kind: OAuth
      name: cluster
    patch: |-
      - op: add
        path: /spec/identityProviders/0/ldap/bindDN
        value: "uid=bind-ocp,cn=users,cn=accounts,dc=clamie,dc=au"
      - op: add
        path: /spec/identityProviders/0/ldap/bindPassword
        value:
          name: ldap-bind-password
